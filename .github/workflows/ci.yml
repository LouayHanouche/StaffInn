name: StaffInn CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Install Playwright Browsers
        run: npm exec -w tests -- playwright install --with-deps firefox
        working-directory: .

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace server
        working-directory: .

      - name: Push schema
        run: npx prisma db push --schema server/prisma/schema.prisma
        working-directory: .
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Lint
        run: npm run lint
        working-directory: .

      - name: Test
        run: npm run test
        working-directory: .

      - name: Build
        run: npm run build
        working-directory: .
